<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      font-family: 'Sora', sans-serif;
      color: #ffffff;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #22d3ee;
      text-transform: uppercase;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 50px rgba(34, 211, 238, 0.05);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      background: linear-gradient(to bottom, #ffffff, #888888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .button {
      display: inline-block;
      padding: 16px 32px;
      background-color: #22d3ee;
      color: #050505;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">SYNAPSE AI</div>
    </div>
    <div class="card">
      <h1>Verification Required</h1>
      <p>Welcome to the Neural Network. To activate your node and begin your cognitive expansion, please confirm your identity below.</p>
      <a href="{{ .ConfirmationURL }}" class="button">Verify Account</a>
    </div>
    <div class="footer">
      WELCOME TO THE NEURAL NETWORK<br>
      © 2026 SYNAPSE AI
    </div>
  </div>
</body>
</html>
